<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>dallas.rip // videography</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="global.css" />
    </head>
    <body>
        <div class="monitor-bezel">
            <!-- Global Header -->
            <div id="global-header"></div>

            <div class="monitor-screen" id="scrollArea">
                <div class="screen-overlay"></div>

                <!-- IMMERSIVE HERO -->
                <div class="hero-wrapper">
                    <div
                        class="hero-bg"
                        id="heroBg"
                        style="
                            background-image: url(&quot;https://images.unsplash.com/photo-1579621970588-a35d0e7ab9b6?q=80&w=2000&auto=format&fit=crop&quot;);
                        "
                    ></div>
                    <div class="hero-vignette"></div>

                    <div class="hero-content" id="heroContent">
                        <div class="micro-text">Motion Picture Production</div>
                        <h1 class="hero-title">Videography.</h1>
                    </div>

                    <div class="scroll-indicator" id="scrollIndicator">
                        <span class="micro-text">SCROLL_TO_ACCESS</span>
                        <div class="scroll-line"></div>
                    </div>
                </div>

                <!-- Main Content Container -->
                <div class="container">
                    <!-- Gallery Header & Filters -->
                    <div class="gallery-header fade-element">
                        <h2 class="section-header">My Work</h2>
                    </div>

                    <!-- Video Grid (Content is dynamically injected) -->
                    <div class="video-grid" id="videoGrid">
                        <!-- Dynamic content goes here -->
                    </div>

                    <!-- CTA Section -->
                    <section class="cta-box fade-element">
                        <h2>License & Commission.</h2>
                        <p>
                            Available globally for production, social media, and
                            other videography work.
                        </p>
                        <a href="contact.html" class="cta-btn"
                            >Work with me >></a
                        >
                    </section>

                    <!-- Global Footer -->
                    <div id="global-footer"></div>
                </div>
            </div>
        </div>

        <!-- Lightbox Modal -->
        <div class="lightbox" id="lightbox">
            <div class="lightbox-container">
                <div class="lightbox-media" id="lb-media"></div>
                <div class="lightbox-info" id="lb-info"></div>
            </div>
            <span class="lb-close" id="lb-close">CLOSE [ESC]</span>
        </div>

        <!-- Load Scripts -->
        <script src="header.js"></script>
        <script src="footer.js"></script>
        <script>
            // 0. HERO ANIMATION
            const scrollArea = document.getElementById("scrollArea");
            const heroBg = document.getElementById("heroBg");
            // ... (rest of hero animation code is unchanged)

            // 1. DYNAMIC CONTENT LOADING FROM DECAP CMS
            const videoGrid = document.getElementById("videoGrid");

            async function loadVideography() {
                try {
                    const response = await fetch("/_videography.json");
                    if (!response.ok)
                        throw new Error("Network response not ok");
                    const videoItems = await response.json();

                    videoGrid.innerHTML = ""; // Clear any placeholders

                    videoItems.forEach((item) => {
                        const videoCard = document.createElement("div");
                        videoCard.className = "video-card";
                        videoCard.dataset.videoUrl = item.video_url;
                        videoCard.dataset.title = item.title;
                        videoCard.dataset.description = item.description || "";

                        // Create inner HTML for the card
                        videoCard.innerHTML = `
                            <video src="${item.thumbnail}" autoplay loop muted playsinline loading="lazy"></video>
                            <div class="play-icon"></div>
                            <div class="video-overlay">
                                <h3 class="video-title">${item.title}</h3>
                            </div>
                        `;
                        videoGrid.appendChild(videoCard);
                    });

                    setupPageInteractions();
                } catch (error) {
                    console.error("Failed to load videography:", error);
                    videoGrid.innerHTML =
                        '<p style="color: var(--text-muted);">Could not load videography portfolio.</p>';
                }
            }

            function setupPageInteractions() {
                const observer = new IntersectionObserver(
                    (entries, obs) => {
                        entries.forEach((entry) => {
                            if (entry.isIntersecting) {
                                entry.target.classList.add("is-visible");
                                obs.unobserve(entry.target);
                            }
                        });
                    },
                    {
                        root: document.getElementById("scrollArea"),
                        threshold: 0.1,
                        rootMargin: "0px 0px -50px 0px",
                    },
                );

                document
                    .querySelectorAll(".fade-element, .video-card")
                    .forEach((el, index) => {
                        el.style.transitionDelay = `${(index % 4) * 0.1}s`;
                        observer.observe(el);
                    });

                const items = document.querySelectorAll(".video-card");
                const lb = document.getElementById("lightbox");
                const lbMedia = document.getElementById("lb-media");
                const lbInfo = document.getElementById("lb-info");

                function openLightbox(data) {
                    const videoUrl = data.videoUrl;
                    if (videoUrl.includes("vimeo")) {
                        const videoId = videoUrl.split("/").pop();
                        lbMedia.innerHTML = `<iframe src="https://player.vimeo.com/video/${videoId}?autoplay=1" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
                    } else if (
                        videoUrl.includes("youtube.com") ||
                        videoUrl.includes("youtu.be")
                    ) {
                        const videoId = new URL(videoUrl).searchParams.get("v");
                        lbMedia.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
                    } else {
                        lbMedia.innerHTML = `<video src="${videoUrl}" controls autoplay playsinline></video>`;
                    }

                    lbInfo.innerHTML = `<h3>${data.title}</h3><p>${data.description}</p>`;
                    lb.classList.add("open");
                }

                function closeLightbox() {
                    lb.classList.remove("open");
                    setTimeout(() => {
                        lbMedia.innerHTML = "";
                        lbInfo.innerHTML = "";
                    }, 300);
                }

                items.forEach((item) => {
                    item.addEventListener("click", () =>
                        openLightbox(item.dataset),
                    );
                });

                lb.addEventListener("click", (e) => {
                    if (e.target === lb || e.target.id === "lb-close")
                        closeLightbox();
                });
                document.addEventListener("keydown", (e) => {
                    if (e.key === "Escape") closeLightbox();
                });
            }

            // Initial Load
            document.addEventListener("DOMContentLoaded", loadVideography);
        </script>

        <script src="canvas.js"></script>
    </body>
</html>
