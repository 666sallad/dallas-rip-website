# Decap CMS Configuration for dallas.rip

# The backend connects to your GitHub repository.
backend:
  name: git-gateway
  branch: main

# Where uploaded media will be saved in your repository.
# This is all that's needed for uploads with git-gateway.
media_folder: "assets/uploads"
public_folder: "/assets/uploads"

# These are the content types you can edit in the CMS.
collections:
  - name: "photography"
    label: "Photography"
    folder: "_photography"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Image", name: "image", widget: "image" }
      - {
          label: "Categories",
          name: "categories",
          widget: "list",
          hint: "Add one or more categories like 'Commercial', 'Fashion', 'Portrait'",
        }

  - name: "videography"
    label: "Videography"
    folder: "_videography"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Vimeo or YouTube URL", name: "video_url", widget: "string" }
      - { label: "Thumbnail Image", name: "thumbnail", widget: "image" }
      - {
          label: "Categories",
          name: "categories",
          widget: "list",
          hint: "Add one or more categories like 'Commercial', 'Music Video', 'Narrative'",
        }
