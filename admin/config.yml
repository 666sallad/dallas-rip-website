# Decap CMS Configuration for dallas.rip

# The backend connects to your GitHub repository.
backend:
  name: git-gateway
  branch: main

# Where uploaded media will be saved in your repository.
# This is all that's needed for uploads with git-gateway.
media_folder: "assets/uploads"
public_folder: "/assets/uploads"

# These are the content types you can edit in the CMS.
collections:
  - name: "photography"
    label: "Photography"
    folder: "_photography"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Description", name: "description", widget: "text" }
      - {
          label: "Categories",
          name: "categories",
          widget: "select",
          multiple: true,
          options: ["Cities", "Nature", "People", "Commercial Work"],
          hint: "Select one or more categories that match the website filters",
        }

  - name: "settings"
    label: "Site Settings"
    editor:
      preview: false
    files:
      - label: "Global Settings"
        name: "global"
        file: "_data/settings.json"
        fields:
          - {
              label: "Site Title (SEO)",
              name: "site_title",
              widget: "string",
              required: false,
            }
          - {
              label: "Site Description (SEO)",
              name: "site_description",
              widget: "text",
              required: false,
            }
          - {
              label: "Favicon / Site Icon",
              name: "favicon",
              widget: "image",
              required: false,
              hint: "Appears in browser tabs and link previews.",
            }
          - {
              label: "Contact Email",
              name: "email",
              widget: "string",
              required: false,
              hint: "Updates the footer universally.",
            }
          - {
              label: "Location",
              name: "location",
              widget: "string",
              required: false,
              hint: "Updates the footer universally.",
            }
          - {
              label: "CTA Heading",
              name: "cta_heading",
              widget: "string",
              required: false,
              hint: "Heading for the 'Work With Me' boxes.",
            }
          - {
              label: "CTA Text",
              name: "cta_text",
              widget: "text",
              required: false,
              hint: "Paragraph for the 'Work With Me' boxes.",
            }

  - name: "videography"
    label: "Videography"
    folder: "_videography"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Vimeo or YouTube URL", name: "video_url", widget: "string" }
      - { label: "Thumbnail Image", name: "thumbnail", widget: "image" }
      - { label: "Description", name: "description", widget: "text" }
