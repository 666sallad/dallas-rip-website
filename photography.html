<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>dallas.rip // photography</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="global.css" />
    </head>
    <body>
        <div class="monitor-bezel">
            <div class="monitor-screen" id="scrollArea">
                <div class="screen-overlay"></div>

                <!-- Top Navigation Fixed Over Hero -->
                <!-- Global Header -->
                <div id="global-header"></div>

                <!-- IMMERSIVE HERO -->
                <div class="hero-wrapper">
                    <!-- Background Image that animates on scroll -->
                    <div
                        class="hero-bg"
                        id="heroBg"
                        style="
                            background-image: url(&quot;https://cdn.prod.website-files.com/6663d648753de64ca2f6a704/68d8dd26a65adb87a4cc07eb_foto.dallas.rip-34.jpg&quot;);
                        "
                    ></div>
                    <div class="hero-vignette"></div>

                    <div class="hero-content" id="heroContent">
                        <div class="micro-text">Portfolio</div>
                        <h1 class="hero-title">Photography.</h1>
                    </div>

                    <div class="scroll-indicator" id="scrollIndicator">
                        <span class="micro-text">SCROLL_TO_ACCESS</span>
                        <div class="scroll-line"></div>
                    </div>
                </div>

                <!-- Main Content Container -->
                <div class="container">
                    <!-- Gallery Header & Filters -->
                    <div class="gallery-header fade-element">
                        <h2 class="section-header">My Portfolio of Work</h2>
                        <div class="filter-tabs">
                            <button class="filter-tab active" data-filter="all">
                                All Photos
                            </button>
                            <button class="filter-tab" data-filter="cities">
                                Cities
                            </button>
                            <button class="filter-tab" data-filter="nature">
                                Nature
                            </button>
                            <button class="filter-tab" data-filter="people">
                                People
                            </button>
                            <button class="filter-tab" data-filter="commercial">
                                Commercial Work
                            </button>
                        </div>
                    </div>

                    <!-- Masonry Gallery -->
                    <div id="gallery">
                        <!-- Content will be dynamically injected here -->
                    </div>

                    <!-- CTA Section -->
                    <section class="cta-box fade-element">
                        <h2>License & Commission.</h2>
                        <p>
                            Prints are available upon inquiry. Currently
                            accepting new commercial brand partnerships
                            globally.
                        </p>
                        <a href="contact.html" class="cta-btn"
                            >Contact Form >></a
                        >
                    </section>

                    <!-- Global Footer -->
                    <div id="global-footer"></div>
                </div>
            </div>
        </div>

        <!-- Lightbox Modal -->
        <div class="lightbox" id="lightbox">
            <span class="lb-close" id="lb-close">CLOSE [ESC]</span>
            <img id="lb-img" src="" alt="Expanded Image" />
        </div>

        <!-- Load Global Footer and Scripts -->
        <script src="footer.js"></script>
        <script>
            // 0. HIGH-END SCROLL REVEAL HERO ANIMATION
            // ... (existing hero animation code remains unchanged)
            const scrollArea = document.getElementById("scrollArea");
            const heroBg = document.getElementById("heroBg");
            const heroContent = document.getElementById("heroContent");
            const scrollIndicator = document.getElementById("scrollIndicator");

            scrollArea.addEventListener("scroll", () => {
                let y = scrollArea.scrollTop;
                let scale = Math.max(0.95, 1.1 - y * 0.0003);
                let brightness = Math.max(0.1, 0.6 - y * 0.0005);
                let blur = Math.min(20, y * 0.02);
                heroBg.style.transform = `scale(${scale})`;
                heroBg.style.filter = `brightness(${brightness}) blur(${blur}px)`;
                heroContent.style.transform = `translateY(${y * 0.5}px)`;
                heroContent.style.opacity = Math.max(0, 1 - y * 0.003);
                scrollIndicator.style.opacity = Math.max(0, 0.7 - y * 0.005);
            });

            // 1. DECAP CMS DYNAMIC CONTENT LOADING
            const gallery = document.getElementById("gallery");

            async function loadPortfolio() {
                try {
                    // Decap CMS automatically creates a JSON file with all entries from a folder.
                    const response = await fetch("/_photography.json");
                    if (!response.ok)
                        throw new Error("Network response was not ok");
                    const portfolioItems = await response.json();

                    gallery.innerHTML = ""; // Clear placeholders

                    portfolioItems.forEach((item, index) => {
                        const galleryImg = document.createElement("div");
                        galleryImg.className = "gallery-img";
                        // Use the first category for the filter, make it lowercase
                        if (item.categories && item.categories.length > 0) {
                            galleryImg.dataset.cat =
                                item.categories[0].toLowerCase();
                        }

                        const img = document.createElement("img");
                        img.src = item.image; // Path from the CMS data
                        img.alt = item.title;
                        img.loading = "lazy";

                        galleryImg.appendChild(img);
                        gallery.appendChild(galleryImg);
                    });

                    // Re-initialize animations and lightbox on the new dynamic items
                    setupInteractions();
                } catch (error) {
                    console.error("Error fetching portfolio:", error);
                    gallery.innerHTML =
                        '<p style="color: var(--text-muted);">Could not load portfolio items.</p>';
                }
            }

            // 2. SETUP FOR ALL INTERACTIONS (Filters, Animations, Lightbox)
            function setupInteractions() {
                const observerOptions = {
                    root: document.getElementById("scrollArea"),
                    threshold: 0.05,
                    rootMargin: "0px 0px -50px 0px",
                };
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach((entry) => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add("is-visible");
                            observer.unobserve(entry.target);
                        }
                    });
                }, observerOptions);

                document
                    .querySelectorAll(".fade-element")
                    .forEach((el) => observer.observe(el));
                document
                    .querySelectorAll(".gallery-img")
                    .forEach((img, index) => {
                        img.style.transitionDelay = `${(index % 6) * 0.1}s`;
                        observer.observe(img);
                    });

                const tabs = document.querySelectorAll(".filter-tab");
                const items = document.querySelectorAll(".gallery-img");

                tabs.forEach((tab) => {
                    tab.addEventListener("click", () => {
                        tabs.forEach((t) => t.classList.remove("active"));
                        tab.classList.add("active");
                        const filter = tab.dataset.filter;
                        items.forEach((item) => {
                            item.style.transitionDelay = "0s";
                            if (
                                filter === "all" ||
                                item.dataset.cat === filter
                            ) {
                                item.classList.remove("hidden");
                                void item.offsetWidth;
                                item.classList.add("is-visible");
                            } else {
                                item.classList.remove("is-visible");
                                setTimeout(() => {
                                    if (!item.classList.contains("is-visible"))
                                        item.classList.add("hidden");
                                }, 300);
                            }
                        });
                    });
                });

                const lb = document.getElementById("lightbox");
                const lbImg = document.getElementById("lb-img");
                items.forEach((item) => {
                    item.addEventListener("click", () => {
                        lbImg.src = item.querySelector("img").src;
                        lb.classList.add("open");
                    });
                });

                lb.addEventListener("click", (e) => {
                    if (e.target === lb || e.target.id === "lb-close")
                        lb.classList.remove("open");
                });
                document.addEventListener("keydown", (e) => {
                    if (e.key === "Escape") lb.classList.remove("open");
                });
            }

            // Initial load
            document.addEventListener("DOMContentLoaded", loadPortfolio);
        </script>
        <script src="header.js"></script>
        <script src="canvas.js"></script>
    </body>
</html>
