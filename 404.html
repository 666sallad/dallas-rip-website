<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>dallas // 404</title>
        <script src="/loader.js"></script>
        <script src="/settings-manager.js"></script>
        <link rel="stylesheet" href="/global.css" />
        <style>
            .error-container {
                position: relative;
                z-index: 2;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100%;
                padding: 40px 5vw;
                text-align: center;
                gap: 24px;
            }

            .error-code {
                font-family: var(--mono);
                font-size: clamp(80px, 15vw, 160px);
                font-weight: 400;
                color: var(--text-main);
                line-height: 1;
                letter-spacing: -0.04em;
                position: relative;
                animation: glitch 4s infinite;
            }

            .error-code::before,
            .error-code::after {
                content: "404";
                position: absolute;
                inset: 0;
                pointer-events: none;
            }

            .error-code::before {
                color: rgba(255, 60, 60, 0.6);
                animation: glitch-before 4s infinite;
                clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
            }

            .error-code::after {
                color: rgba(60, 200, 255, 0.5);
                animation: glitch-after 4s infinite;
                clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
            }

            @keyframes glitch {
                0%, 90%, 100% { transform: none; }
                91% { transform: skewX(-1deg); }
                92% { transform: none; }
                93% { transform: skewX(1deg); }
                94% { transform: none; }
            }

            @keyframes glitch-before {
                0%, 90%, 100% { transform: none; opacity: 0; }
                91% { transform: translate(-3px, 1px); opacity: 1; }
                92% { transform: none; opacity: 0; }
                93% { transform: translate(3px, -1px); opacity: 1; }
                94% { transform: none; opacity: 0; }
            }

            @keyframes glitch-after {
                0%, 90%, 100% { transform: none; opacity: 0; }
                91% { transform: translate(3px, -1px); opacity: 1; }
                92% { transform: none; opacity: 0; }
                93% { transform: translate(-3px, 1px); opacity: 1; }
                94% { transform: none; opacity: 0; }
            }

            .error-label {
                font-family: var(--mono);
                font-size: 11px;
                letter-spacing: 0.2em;
                color: var(--text-dim);
                text-transform: uppercase;
            }

            .error-message {
                font-family: var(--sans);
                font-size: clamp(18px, 3vw, 26px);
                font-weight: 300;
                color: var(--text-muted);
                max-width: 480px;
                line-height: 1.5;
            }

            .error-path {
                font-family: var(--mono);
                font-size: 12px;
                color: rgba(255,255,255,0.25);
                padding: 8px 16px;
                border: 1px solid rgba(255,255,255,0.08);
                border-radius: 4px;
                background: rgba(255,255,255,0.02);
                word-break: break-all;
                max-width: 480px;
            }

            .error-nav {
                display: flex;
                gap: 12px;
                flex-wrap: wrap;
                justify-content: center;
                margin-top: 8px;
            }

            .error-btn {
                font-family: var(--mono);
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: 0.15em;
                color: var(--text-main);
                text-decoration: none;
                padding: 14px 28px;
                border: 1px solid rgba(255, 255, 255, 0.25);
                border-radius: 4px;
                background: rgba(255,255,255,0.04);
                transition: background 0.2s, border-color 0.2s;
            }

            .error-btn:hover {
                background: rgba(255,255,255,0.1);
                border-color: rgba(255,255,255,0.5);
            }

            .error-btn.primary {
                background: rgba(255,255,255,0.08);
                border-color: rgba(255,255,255,0.4);
            }

            .scanline-error {
                position: fixed;
                inset: 0;
                pointer-events: none;
                z-index: 1;
                background: repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0,0,0,0.08) 2px,
                    rgba(0,0,0,0.08) 4px
                );
            }
        </style>
    </head>
    <body>
        <div class="monitor-bezel">
            <div class="monitor-screen">
                <canvas id="cyber-canvas"></canvas>
                <div class="screen-overlay"></div>
                <div class="scanline-error"></div>

                <div class="hud-layer">
                    <div id="global-header"></div>

                    <div class="error-container">
                        <div class="error-label">// signal lost</div>

                        <div class="error-code">404</div>

                        <p class="error-message">
                            This page doesn't exist anymore — or maybe it never did.
                        </p>

                        <div class="error-path" id="error-path">/&mdash;</div>

                        <nav class="error-nav">
                            <a href="/" class="error-btn primary">>> home</a>
                            <a href="/wallpapers.html" class="error-btn">>> wallpapers</a>
                            <a href="/photography.html" class="error-btn">>> photography</a>
                        </nav>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const pathEl = document.getElementById("error-path");
            if (pathEl) pathEl.textContent = window.location.pathname;
        </script>
        <script src="/header.js"></script>
        <script src="/background.js" type="module"></script>
        <script>
            window.addEventListener("DOMContentLoaded", () => {
                if (window.pageIsReady) window.pageIsReady();
            });
        </script>
    </body>
</html>
