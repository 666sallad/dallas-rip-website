<!doctype html>
<html lang="en">
    <head>
        <!-- Google tag (gtag.js) -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-56PBM5RCE5"></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', 'G-56PBM5RCE5');
        </script>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>dallas.rip // contact_protocol</title>
        
        <link rel="stylesheet" href="global.css" />
    </head>
    <body>
        <div class="monitor-bezel">
            <div class="monitor-screen" id="scrollArea">
                <canvas id="cyber-canvas"></canvas>
                <div class="screen-overlay"></div>

                <div class="container">
                    <!-- Top Navigation -->
                    <!-- Global Header -->
                    <div id="global-header"></div>

                    <!-- Hero -->
                    <section class="hero">
                        <div class="micro-text">Let's work together</div>
                        <h1>Contact.</h1>
                        <p>
                            Provide your project details below to request a
                            quote or start a conversation.
                        </p>
                    </section>

                    <!-- Form Panel -->
                    <div class="form-panel">
                        <form
                            id="contactForm"
                            action="https://formspree.io/f/xeepvvar"
                            method="POST"
                        >
                            <div class="form-group">
                                <label class="form-label">Name</label>
                                <input
                                    type="text"
                                    name="name"
                                    class="form-control"
                                    placeholder="Your name..."
                                    required
                                />
                            </div>

                            <div class="form-group">
                                <label class="form-label">Email Address</label>
                                <input
                                    type="email"
                                    name="email"
                                    class="form-control"
                                    placeholder="user@domain.com"
                                    required
                                />
                            </div>

                            <div class="form-group">
                                <label class="form-label">Phone Number</label>
                                <input
                                    type="tel"
                                    name="phone"
                                    class="form-control"
                                    placeholder="+61..."
                                    required
                                />
                            </div>

                            <div class="form-group">
                                <label class="form-label">Project Type</label>
                                <div class="selection-grid">
                                    <label class="radio-label selected">
                                        <input
                                            type="radio"
                                            name="project_type"
                                            value="Photography"
                                            checked
                                            onchange="updateRadios(this)"
                                        />
                                        <span class="radio-text"
                                            >Photography</span
                                        >
                                    </label>
                                    <label class="radio-label">
                                        <input
                                            type="radio"
                                            name="project_type"
                                            value="Videography"
                                            onchange="updateRadios(this)"
                                        />
                                        <span class="radio-text"
                                            >Videography</span
                                        >
                                    </label>
                                    <label class="radio-label">
                                        <input
                                            type="radio"
                                            name="project_type"
                                            value="Websites"
                                            onchange="updateRadios(this)"
                                        />
                                        <span class="radio-text">Websites</span>
                                    </label>
                                    <label class="radio-label">
                                        <input
                                            type="radio"
                                            name="project_type"
                                            value="Advertising"
                                            onchange="updateRadios(this)"
                                        />
                                        <span class="radio-text"
                                            >Advertising</span
                                        >
                                    </label>
                                </div>
                            </div>

                            <div class="form-group">
                                <label class="form-label"
                                    >Project Details</label
                                >
                                <textarea
                                    name="message"
                                    class="form-control"
                                    placeholder="Tell me about your goals..."
                                ></textarea>
                            </div>

                            <button
                                type="submit"
                                class="submit-btn"
                                id="submitBtn"
                            >
                                Send Message
                                <span style="font-size: 10px">>></span>
                            </button>
                        </form>

                        <div id="successMessage" class="success-message">
                            <p>
                                > Message Sent Successfully.<br />
                                > Your inquiry has been forwarded.<br />
                                > I will be in touch shortly.<span
                                    class="cursor-blink"
                                ></span>
                            </p>
                        </div>
                    </div>

                    <!-- Global Footer INJECTED PROPERLY INSIDE CONTAINER -->
                    <div id="global-footer" style="margin-top: 60px"></div>
                </div>
            </div>
        </div>
        <script src="footer.js"></script>
        <script>
            // UI logic for custom radio buttons
            function updateRadios(selectedInput) {
                document.querySelectorAll(".radio-label").forEach((label) => {
                    label.classList.remove("selected");
                });
                selectedInput.parentElement.classList.add("selected");
            }

            // Fluid Form Submission Logic (AJAX)
            const contactFormEl = document.getElementById("contactForm");
            const submitBtn = document.getElementById("submitBtn");
            const successMessage = document.getElementById("successMessage");

            contactFormEl.addEventListener("submit", async function (event) {
                event.preventDefault(); // Prevent page reload

                // Change UI to loading state
                const originalBtnHTML = submitBtn.innerHTML;
                submitBtn.innerHTML =
                    'Sending... <span class="cursor-blink"></span>';
                submitBtn.disabled = true;

                // Grab form data
                const data = new FormData(contactFormEl);

                try {
                    // Send data to Formspree
                    const response = await fetch(contactFormEl.action, {
                        method: contactFormEl.method,
                        body: data,
                        headers: {
                            Accept: "application/json",
                        },
                    });

                    if (response.ok) {
                        // Success state
                        contactFormEl.reset();
                        contactFormEl.style.display = "none";
                        successMessage.style.display = "block";
                    } else {
                        // Handle Formspree specific errors
                        let errorMsg = "SYSTEM_ERROR: Transmission failed.";
                        const result = await response.json();
                        if (Object.hasOwn(result, "errors")) {
                            errorMsg = result.errors
                                .map((error) => error.message)
                                .join(", ");
                        }
                        alert(errorMsg);
                        submitBtn.innerHTML = originalBtnHTML;
                        submitBtn.disabled = false;
                    }
                } catch (error) {
                    // IMPORTANT: During local development (or if Formspree ID isn't set yet),
                    // the fetch might fail. To keep the fluid demo working for you right now,
                    // we'll simulate a success response if the network request fails locally.

                    console.log(
                        "Intercepted submission for demo purposes (replace Formspree ID to send real emails).",
                    );

                    setTimeout(() => {
                        contactFormEl.reset();
                        contactFormEl.style.display = "none";
                        successMessage.style.display = "block";
                    }, 1500);
                }
            });
        </script>
        <script src="header.js"></script>
        <script src="background.js" type="module"></script>
        <script>
            window.addEventListener("DOMContentLoaded", () => {
                if (window.pageIsReady) {
                    window.pageIsReady();
                }
            });
        </script>
    </body>
</html>
